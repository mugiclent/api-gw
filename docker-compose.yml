services:
  api-gw:
    image: ${DOCKER_USERNAME}/api-gw:${IMAGE_TAG:-latest}
    container_name: api-gw
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      ROUTES_URL: ${ROUTES_URL}
      ROUTES_TOKEN: ${ROUTES_TOKEN}
      ROUTES_POLL_INTERVAL_MS: ${ROUTES_POLL_INTERVAL_MS}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    networks:
      - katisha-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8090/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  katisha-net:
    external: true
